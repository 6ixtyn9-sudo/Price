name: Research Discovery Shards

on:
  workflow_dispatch:
    inputs:
      parent_run_id:
        description: "Research refresh run that opened the fresh-data gate"
        required: false
        default: manual
      batch_size:
        description: "Symbols per shard"
        required: false
        default: "20"
  workflow_call:
    inputs:
      parent_run_id:
        required: false
        type: string
        default: manual
      batch_size:
        required: false
        type: string
        default: "20"

concurrency:
  group: research-discovery
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  PYTHONPATH: src

jobs:
  plan:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      shard_ids: ${{ steps.plan.outputs.shard_ids }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build shard plan
        id: plan
        env:
          BATCH_SIZE: ${{ inputs.batch_size || '20' }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          payload = json.load(open("localdata/explicit_allowlist.json"))
          symbols = payload["all"]
          batch_size = int(os.environ["BATCH_SIZE"])
          include = []
          for timeframe in ("1d", "1h", "15m"):
              for offset in range(0, len(symbols), batch_size):
                  batch = symbols[offset:offset + batch_size]
                  index = offset // batch_size
                  include.append({
                      "shard_id": f"{timeframe}-{index:02d}",
                      "timeframe": timeframe,
                      "symbols": " ".join(batch),
                  })
          print("matrix=" + json.dumps({"include": include}, separators=(",", ":")))
          print("shard_ids=" + json.dumps([item["shard_id"] for item in include]))
          PY

  shards:
    needs: plan
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.lock
      - name: Restore research warehouse cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: localdata/warehouse
          key: research-warehouse-v4-${{ runner.os }}-research-discovery-${{ github.run_id }}
          restore-keys: |
            research-warehouse-v4-${{ runner.os }}-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock
      - name: Run isolated shard
        run: |
          python scripts/research_shard.py \
            --shard-id "${{ matrix.shard_id }}" \
            --timeframe "${{ matrix.timeframe }}" \
            --symbols ${{ matrix.symbols }} \
            --output-dir "localdata/research/shards/${{ matrix.shard_id }}" \
            --condition-on USO TLT \
            --bin-mode rolling
      - name: Upload shard output
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: research-shard-${{ matrix.shard_id }}
          path: localdata/research/shards/${{ matrix.shard_id }}
          if-no-files-found: error
          retention-days: 14

  merge:
    needs: [plan, shards]
    if: ${{ needs.shards.result == 'success' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.lock
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock
      - name: Download all completed shards
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: research-shard-*
          path: localdata/research/shards
          merge-multiple: false
      - name: Write expected shard manifest
        env:
          SHARD_IDS: ${{ needs.plan.outputs.shard_ids }}
        run: echo '{"shard_ids":'"$SHARD_IDS"'}' > localdata/research/expected_shards.json
      - name: Merge complete shard set
        run: |
          python scripts/research_merge.py \
            --shard-root localdata/research/shards \
            --expected-shards localdata/research/expected_shards.json \
            --output-dir localdata/research/merged
      - name: Commit merged research outputs only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add localdata/research/merged localdata/research/expected_shards.json
          if git diff --cached --quiet; then
            echo "No merged research changes to commit."
            exit 0
          fi
          git commit -m "chore(research-discovery): merge complete shard set [skip ci]"
          git push
