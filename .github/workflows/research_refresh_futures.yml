name: Research Refresh Futures

on:
  workflow_dispatch:
    inputs:
      timeframes:
        description: "Timeframes to refresh"
        required: false
        default: "1d 1h"
      min_new_daily_bars:
        description: "Min new daily bars per symbol"
        required: false
        default: "5"

concurrency:
  group: research-refresh-futures
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PYTHONPATH: src

jobs:
  research-refresh-futures:
    runs-on: ubuntu-24.04
    timeout-minutes: 300
    permissions:
      contents: write
    outputs:
      should_dispatch_discovery: ${{ steps.dispatch_gate.outputs.should_dispatch }}
      cache_key: ${{ steps.cache_key.outputs.key }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.lock

      - name: Compute cache key
        id: cache_key
        run: echo "key=research-warehouse-v4-${{ runner.os }}-futures-refresh-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Restore warehouse cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: localdata/warehouse
          key: ${{ steps.cache_key.outputs.key }}
          restore-keys: |
            research-warehouse-v4-${{ runner.os }}-

      - name: Seed warehouse from release if empty
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -d localdata/warehouse ] && [ "$(find localdata/warehouse -name '*.parquet' | wc -l)" -gt 0 ]; then
            echo "Warehouse populated"
            exit 0
          fi
          SEED_TAG="${WAREHOUSE_SEED_TAG:-warehouse-v1}"
          if gh release view "$SEED_TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            mkdir -p localdata
            gh release download "$SEED_TAG" --repo "$GITHUB_REPOSITORY" --pattern 'warehouse-research.tar.gz' --dir /tmp --clobber
            tar xzf /tmp/warehouse-research.tar.gz -C localdata
            rm /tmp/warehouse-research.tar.gz
          else
            echo "No seed $SEED_TAG"
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock

      - name: Verify required secrets
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          : "${ALPACA_API_KEY:?Missing ALPACA_API_KEY}"
          : "${ALPACA_SECRET_KEY:?Missing ALPACA_SECRET_KEY}"

      - name: Guard against tracked secrets
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then echo "::error::.env tracked"; exit 1; fi

      - name: Capture full futures universe
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          FUTURES_SYMBOLS=$(python3 - <<'PY'
          from price.futures_metadata import get_research_futures_symbols
          print(" ".join(get_research_futures_symbols()))
          PY
          )
          echo "Capturing $FUTURES_SYMBOLS"
          python scripts/capture_bars.py --symbols $FUTURES_SYMBOLS --timeframes 1d --days 365 --skip-postprocess
          python scripts/capture_bars.py --symbols $FUTURES_SYMBOLS --timeframes 1h --days 365 || true

      - name: Run futures research refresh
        run: |
          FUTURES_SYMBOLS=$(python3 - <<'PY'
          from price.futures_metadata import get_research_futures_symbols
          print(" ".join(get_research_futures_symbols()))
          PY
          )
          python scripts/research_futures.py --symbols $FUTURES_SYMBOLS --timeframes ${{ inputs.timeframes || '1d 1h' }} --output-dir localdata/research/futures/1d || true
          ls -lh localdata/research/futures/1d/ || ls -lh localdata/research/futures/

      - name: Compute dispatch gate
        id: dispatch_gate
        run: |
          if [ ! -f localdata/research/futures/1d/monitored_candidates_futures.csv ] || [ ! -s localdata/research/futures/1d/monitored_candidates_futures.csv ]; then
            echo "should_dispatch=true" >> "$GITHUB_OUTPUT"
          else
            COUNT=$(wc -l < localdata/research/futures/1d/monitored_candidates_futures.csv)
            if [ "$COUNT" -le 1 ]; then echo "should_dispatch=true" >> "$GITHUB_OUTPUT"; else echo "should_dispatch=false" >> "$GITHUB_OUTPUT"; fi
          fi

      - name: Save warehouse cache
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: localdata/warehouse
          key: ${{ steps.cache_key.outputs.key }}

      - name: Commit futures research outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add localdata/research/futures/1d/ || true
          if git diff --cached --quiet; then echo "No futures research changes"; exit 0; fi
          git commit -m "chore(research-refresh-futures): update futures research [skip ci]"
          for attempt in 1 2 3; do git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" && git push --force-with-lease && break; sleep $((attempt*5)); done

  dispatch-discovery:
    needs: research-refresh-futures
    if: ${{ fromJSON(needs.research-refresh-futures.outputs.should_dispatch_discovery) }}
    uses: ./.github/workflows/research_futures_discovery.yml
    with:
      timeframes: "1d 1h"
      batch_size: "5"
    secrets: inherit
