name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - ".github/workflows/supabase_deploy.yml"
  workflow_dispatch:

# Least-privilege: only allow reading to deployments
permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Check Supabase deployment readiness
        id: readiness
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          set -euo pipefail

          READY=true
          REASONS=()

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            READY=false
            REASONS+=("SUPABASE_ACCESS_TOKEN secret is missing")
          fi

          if [ -z "${SUPABASE_PROJECT_ID:-}" ]; then
            READY=false
            REASONS+=("SUPABASE_PROJECT_ID secret is missing")
          fi

          echo "ready=$READY" >> "$GITHUB_OUTPUT"

          if [ "$READY" != "true" ]; then
            echo "Supabase deployment is not configured yet."
            printf 'Reasons:\n'
            for r in "${REASONS[@]}"; do
              echo "- $r"
            done
            echo "Skipping deploy successfully."
          else
            echo "Supabase deployment secrets detected. Proceeding."
          fi

      - name: Setup Deno
        if: steps.readiness.outputs.ready == 'true'
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Setup Supabase CLI
        if: steps.readiness.outputs.ready == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Resolve Project ID
        if: steps.readiness.outputs.ready == 'true'
        id: resolve
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          set -euo pipefail

          PROJECT_ID=""

          if grep -q '^project_id' supabase/config.toml; then
            PROJECT_ID=$(awk -F'"' '/^project_id/ {print $2; exit}' supabase/config.toml)
          fi

          if [ -z "$PROJECT_ID" ] && [ -n "${SUPABASE_PROJECT_ID:-}" ]; then
            PROJECT_ID="$SUPABASE_PROJECT_ID"
          fi

          if [ -z "$PROJECT_ID" ]; then
            echo "ERROR: No Supabase project id found in supabase/config.toml or SUPABASE_PROJECT_ID secret."
            exit 1
          fi

          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved project id: $PROJECT_ID"

      # ── PUBLIC-FACING (no JWT required) ─────────────────────
      - name: Deploy paws-chat
        if: steps.readiness.outputs.ready == 'true'
        run: |
          supabase functions deploy paws-chat \
            --project-ref "${{ steps.resolve.outputs.project_id }}" \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── PRIVILEGED (JWT required - Default) ──────────────────
      - name: Deploy paws-intake
        if: steps.readiness.outputs.ready == 'true'
        run: |
          supabase functions deploy paws-intake \
            --project-ref "${{ steps.resolve.outputs.project_id }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy paws-2fa-verify
        if: steps.readiness.outputs.ready == 'true'
        run: |
          supabase functions deploy paws-2fa-verify \
            --project-ref "${{ steps.resolve.outputs.project_id }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy paws-secure-action
        if: steps.readiness.outputs.ready == 'true'
        run: |
          supabase functions deploy paws-secure-action \
            --project-ref "${{ steps.resolve.outputs.project_id }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy paws-council
        if: steps.readiness.outputs.ready == 'true'
        run: |
          supabase functions deploy paws-council \
            --project-ref "${{ steps.resolve.outputs.project_id }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deployment intentionally skipped
        if: steps.readiness.outputs.ready != 'true'
        run: |
          echo "Supabase is not connected yet. This deploy workflow is intentionally passing without deploying."