name: Live Capture Equities

on:
  workflow_dispatch:
    inputs:
      live_symbols:
        description: "Symbols to capture (space-separated)"
        required: false
        default: "SPY QQQ IWM DIA GLD TLT USO XLK XLF XLE XOP XLB KLAC"

concurrency:
  group: live-capture
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PYTHONPATH: src

jobs:
  live-capture:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.lock

      - name: Restore warehouse cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: localdata/warehouse
          key: research-warehouse-v4-${{ runner.os }}-live-capture-${{ github.run_id }}
          restore-keys: |
            research-warehouse-v4-${{ runner.os }}-

      - name: Restore operational paper state cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            localdata/trade_journal.csv
            localdata/paper_trade_log.csv
            localdata/stop_state.json
            localdata/stopout_journal.json
            localdata/cooldown_journal.json
          key: live-ops-state-v1-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            live-ops-state-v1-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock

      - name: Verify required secrets
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          : "${ALPACA_API_KEY:?Missing repository secret ALPACA_API_KEY}"
          : "${ALPACA_SECRET_KEY:?Missing repository secret ALPACA_SECRET_KEY}"
          : "${TIINGO_API_KEY:?Missing repository secret TIINGO_API_KEY}"

      - name: Guard against tracked secrets
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo "::error::.env is tracked by git. Remove it with: git rm --cached .env"
            exit 1
          fi

      # Sync first so any candidate book change from the latest research merge
      # is included in this run's warehouse capture, not delayed until the
      # next hourly pass.
      - name: Sync monitored slices and edge metrics before capture

      - name: Ingest universe data
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          MONITORED_SYMBOLS=$(python3 -c "import pandas as pd, os; print(' '.join(sorted(pd.read_csv('localdata/monitored_slices.csv')['symbol'].unique()))) if os.path.exists('localdata/monitored_slices.csv') else ''")
          SYMBOLS=$(echo "${{ inputs.live_symbols }} $MONITORED_SYMBOLS" | tr ' ' '\n' | grep -v '^$' | sort -u | tr '\n' ' ')
          echo "Capturing data for active symbols: $SYMBOLS"
          # Defer post-processing until the 15m pass; capture_bars owns the
          # resample/adjustment phase, so no second build_warehouse pass is needed.
          python scripts/capture_bars.py --symbols $SYMBOLS --timeframes 1d --days 1825 --skip-postprocess
          python scripts/capture_bars.py --symbols $SYMBOLS --timeframes 15m --days 365

      - name: Run paper trade using repository monitor list
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          python scripts/paper_trade.py \
            --max-notional 2500 --max-open 12 --max-daily-loss 500 \
            --cooldown-seconds 3600 --auto-sizing-equity --risk-fraction 0.005 \
            --exit-horizon 5 --max-per-group 3 --stop-atr-mult 2.0 \
            --trail-atr-mult 3.0 --breakeven-trigger-r 1.0 \
            --max-aggregate-risk-pct 0.03 --whipsaw-limit 2 \
            --cost-spread-bps 1.5 --cost-slippage-bps 5.0 --allow-shorts \
            --take-profit-r 3.0 \
            --eod-profit-lock-r 0.75 \
            --eod-lock-minutes 45 \
            --giveback-trigger-r 2.0 \
            --max-giveback-r 1.0

      - name: Run live forward-return capture
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          python scripts/live_forward_returns.py --universe-source monitored

      - name: Check operational paper state cache content
        id: ops_state
        run: |
          shopt -s nullglob
          files=(
            localdata/trade_journal.csv
            localdata/paper_trade_log.csv
            localdata/stop_state.json
            localdata/stopout_journal.json
            localdata/cooldown_journal.json
          )
          echo "has_state=false" >> "$GITHUB_OUTPUT"
          for f in "${files[@]}"; do
            if [ -s "$f" ]; then
              echo "has_state=true" >> "$GITHUB_OUTPUT"
              break
            fi
          done

      - name: Save operational paper state cache
        if: ${{ steps.ops_state.outputs.has_state == 'true' }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            localdata/trade_journal.csv
            localdata/paper_trade_log.csv
            localdata/stop_state.json
            localdata/stopout_journal.json
            localdata/cooldown_journal.json
          key: live-ops-state-v1-${{ runner.os }}-${{ github.run_id }}

      - name: Commit workflow outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Block auto-commit on runaway row-count growth.
          python scripts/delta_spike_guard.py

          # Commit all generated intelligence AND operational broker/paper state.
          # The ops cache is a speed layer; these files are also committed
          # so the journal survives cache eviction and runner ephemeral-fs loss.
          # Previously the journal was cache-only, meaning any trade that
          # entered and exited within a single scan cycle (or whose cache save
          # raced with a commit) was lost — unrecoverable except as
          # UNATTRIBUTED_BROKER_FILL backfill rows. See HANDOVER.md
          # session update 2026-07-21.
          files=(
            localdata/live_forward_returns.csv
            localdata/monitored_edge_metrics.csv
            localdata/monitored_slices.csv
            localdata/trade_journal.csv
            localdata/paper_trade_log.csv
            localdata/stop_state.json
            localdata/stopout_journal.json
            localdata/cooldown_journal.json
          )
          existing=()
          for f in "${files[@]}"; do
            [ -e "$f" ] && existing+=("$f")
          done
          if ((${#existing[@]})); then
            git add "${existing[@]}"
          fi

          if git diff --cached --quiet; then
            echo "No workflow output changes to commit." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "## Live capture output changes"
            echo
            git diff --cached --stat
          } >> "$GITHUB_STEP_SUMMARY"

          git commit -m "chore(live-capture): update workflow output [skip ci]"
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" && git push --force-with-lease && break
            if [ "$attempt" = 3 ]; then
              echo "::error::git push failed after 3 attempts"
              exit 1
            fi
            sleep $((attempt * 5))
          done
