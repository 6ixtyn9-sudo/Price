name: Research Refresh

on:
  workflow_dispatch:

concurrency:
  group: research-refresh
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PYTHONPATH: src

jobs:
  research-refresh:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      contents: write
    outputs:
      should_dispatch_discovery: ${{ steps.dispatch_gate.outputs.should_dispatch }}
      cache_key: ${{ steps.cache_key.outputs.key }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.lock

      - name: Compute research warehouse cache key
        id: cache_key
        run: echo "key=research-warehouse-v4-${RUNNER_OS}-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Restore latest research warehouse cache
        id: warehouse
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: localdata/warehouse
          key: ${{ steps.cache_key.outputs.key }}
          restore-keys: |
            research-warehouse-v4-${{ runner.os }}-

      - name: Seed warehouse from release if cache is empty
        if: steps.warehouse.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -d localdata/warehouse ] && [ "$(find localdata/warehouse -name '*.parquet' | wc -l)" -gt 0 ]; then
            echo "Warehouse already populated from cache restore. Skipping seed."
            exit 0
          fi
          echo "Cache miss — attempting to seed warehouse from release asset..."
          SEED_TAG="warehouse-v1"
          if gh release view "$SEED_TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            mkdir -p localdata
            gh release download "$SEED_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern 'warehouse-research.tar.gz' \
              --dir /tmp \
              --clobber
            tar xzf /tmp/warehouse-research.tar.gz -C localdata
            rm /tmp/warehouse-research.tar.gz
            PARQUET_COUNT=$(find localdata/warehouse -name '*.parquet' | wc -l)
            echo "Seeded warehouse: $PARQUET_COUNT parquet partitions."
          else
            echo "No warehouse release found ($SEED_TAG). Will fetch from APIs."
          fi

      - name: Restore operational paper state cache for telemetry
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            localdata/trade_journal.csv
            localdata/paper_trade_log.csv
            localdata/stop_state.json
            localdata/stopout_journal.json
            localdata/cooldown_journal.json
          key: live-ops-state-v1-${{ runner.os }}-research-${{ github.run_id }}
          restore-keys: |
            live-ops-state-v1-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock

      - name: Verify required secrets
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          : "${ALPACA_API_KEY:?Missing repository secret ALPACA_API_KEY}"
          : "${ALPACA_SECRET_KEY:?Missing repository secret ALPACA_SECRET_KEY}"
          : "${TIINGO_API_KEY:?Missing repository secret TIINGO_API_KEY}"

      - name: Guard against tracked secrets
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo "::error::.env is tracked by git"
            exit 1
          fi

      - name: Capture full active universe
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          # The allowlist is resolved from explicit_allowlist.json. The
          # capture client already chunks requests and applies deterministic
          # 0.35s pacing plus exponential backoff.
          python scripts/capture_bars.py \
            --tier allowlist \
            --timeframes 1d \
            --days 1825
          python scripts/capture_bars.py \
            --tier allowlist \
            --timeframes 15m \
            --days 365
          mapfile -t ACTIVE_SYMBOLS < <(
            python - <<'PY'
            import json
            MAX_SCHEDULED_SYMBOLS = 500
            payload = json.load(open("localdata/explicit_allowlist.json"))
            symbols = payload["all"]
            if len(symbols) > MAX_SCHEDULED_SYMBOLS:
                raise SystemExit(
                    f"Refusing scheduled research refresh for {len(symbols)} symbols "
                    f"> cap {MAX_SCHEDULED_SYMBOLS}; split/approve this expansion explicitly."
                )
            for symbol in symbols:
                print(symbol)
            PY
          )
          python scripts/build_warehouse.py --symbols "${ACTIVE_SYMBOLS[@]}"

      - name: Run autonomous research controller
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          # Daily maintenance is discovery-gated. Full-universe multi-timeframe
          # discovery is never run directly here; when the fresh-data gate opens,
          # this job dispatches the sharded research_discovery workflow below.
          python scripts/research_refresh.py \
            --timeframes 1d 1h 15m \
            --min-new-daily-bars 60 \
            --allow-discovery \
            --condition-on USO TLT

      - name: Build research manifest
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          state_path = Path("localdata/research/refresh_state.json")
          state = json.loads(state_path.read_text()) if state_path.exists() else {}
          state.update({
              "workflow": "research_refresh",
              "generated_at_utc": datetime.now(timezone.utc).isoformat(),
              "orders_placed": False,
              "monitored_slices_modified": False,
              "automatic_promotion_enabled": False,
          })
          state_path.write_text(json.dumps(state, indent=2) + "\n")
          PY

      - name: Compute discovery dispatch gate
        id: dispatch_gate
        run: |
          should_dispatch=$(python - <<'PY'
          import json
          from pathlib import Path
          state_path = Path("localdata/research/refresh_state.json")
          state = json.loads(state_path.read_text()) if state_path.exists() else {}
          print("true" if (
              state.get("fresh_data_gate_open")
              and state.get("sharded_discovery_required")
              and not state.get("discovery_ran")
          ) else "false")
          PY
          )
          echo "should_dispatch=$should_dispatch" >> "$GITHUB_OUTPUT"
          echo "Discovery dispatch gate: $should_dispatch"

      - name: Save refreshed research warehouse
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: localdata/warehouse
          key: ${{ steps.cache_key.outputs.key }}

      - name: Commit isolated research outputs only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          shopt -s nullglob
          files=(localdata/research/*.csv localdata/research/*.json)
          if ((${#files[@]} == 0)); then
            echo "No research outputs were produced."
            exit 0
          fi
          git add "${files[@]}"
          if git diff --cached --quiet; then
            echo "No research output changes to commit."
            exit 0
          fi
          git commit -m "chore(research-refresh): update full-universe research state [skip ci]"
          for attempt in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME:-main}" && git push && break
            if [ "$attempt" = 3 ]; then
              echo "::error::git push failed after 3 attempts"
              exit 1
            fi
            sleep $((attempt * 5))
          done

  cache-maintenance:
    needs: research-refresh
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      actions: write
    steps:
      - name: Remove superseded research warehouse caches
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_CACHE_KEY: ${{ needs.research-refresh.outputs.cache_key }}
        run: |
          gh cache list --limit 100 --json id,key > /tmp/research-caches.json
          python - <<'PY'
          import json
          import os
          import subprocess

          current = os.environ["CURRENT_CACHE_KEY"]
          payload = json.load(open("/tmp/research-caches.json"))
          prefix = "research-warehouse-v4-"
          for item in payload:
              key = item.get("key", "")
              cache_id = item.get("id")
              if cache_id and key.startswith(prefix) and key != current:
                  subprocess.run(["gh", "cache", "delete", str(cache_id), "--confirm"], check=True)
          PY

  dispatch-discovery:
    needs: research-refresh
    if: ${{ needs.research-refresh.outputs.should_dispatch_discovery == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      actions: write
    steps:
      - name: Dispatch sharded discovery
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run research_discovery.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f parent_run_id="$GITHUB_RUN_ID"
