name: Live Capture

# End-of-day paper-trading + live-capture workflow.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   ALPACA_API_KEY
#   ALPACA_SECRET_KEY
#   TIINGO_API_KEY
#
# What this workflow does:
#   1. Pulls the latest warehouse + paper-trading journals from main.
#   2. Pulls the most recent bars from Tiingo/Alpaca and rebuilds the warehouse.
#   3. Re-runs discovery + the candidate leaderboard to refresh clean_survivor*.
#   4. Runs paper_trade.py in LIVE PAPER mode (never real money; trading.py is hardwired paper=True).
#   5. Runs live_forward_returns.py to capture realized forward returns for any matched signals.
#   6. Auto-commits the lightweight workflow artifacts back to main.
#
# What this workflow does NOT do:
#   - Trade real money.
#   - Override the project doctrine about promotion; paper trades are evidence generation.
#   - Run on its own commits (concurrency block below).
#
# See HANDOVER.md "Paper-Trading Exploration Layer (2026-07-02)" and
# "Scheduled Live Capture (2026-07-02)".

on:
  # 21:00 UTC = 17:00 ET (1 hour after US market close, weekdays only).
  # 1d end-of-day bars are typically published by Tiingo by then, and
  # waiting an hour avoids the partial-bar NaN issue we saw when the
  # 6-hourly cron fired mid-session. The workflow_dispatch trigger
  # below remains for manual override.
  schedule:
    - cron: "0 21 * * 1-5"
  workflow_dispatch:

concurrency:
  group: live-capture
  cancel-in-progress: true

jobs:
  live-capture:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run capture_bars (1d, 5-year history for V4 validation)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          # Pull 1d history for the standard universe. The V4
          # validation discipline requires ~1 year minimum and the
          # clean_survivor tier (the only tier the live forward-
          # return layer tracks) typically needs 3+ years to
          # produce any survivors. We use 5 years to match the
          # V4 cross-asset historical analysis. 1d comes from
          # Tiingo (primary, free tier). build_warehouse.py
          # propagates the daily adjustment factors to intraday.
          PYTHONPATH=src python3 scripts/capture_bars.py \
            --symbols XLF XLK SPY XOP XLB KLAC TLT USO \
            --timeframes 1d \
            --days 1825
          PYTHONPATH=src python3 scripts/build_warehouse.py \
            --symbols XLF XLK SPY XOP XLB KLAC TLT USO

      - name: Run capture_bars (15m, 30-day history for intraday monitoring)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          # Pull 15m history for intraday monitoring only. 30 days
          # is enough for paper_trade.py --dry-run to compute
          # the current 1h state via the resample step. The
          # intraday slices are NOT the live-capture layer's
          # primary research target (XLF 1d is) so a shorter
          # history here is fine and keeps the workflow within
          # its 15-minute timeout.
          PYTHONPATH=src python3 scripts/capture_bars.py \
            --symbols XLF XLK SPY XOP XLB KLAC TLT USO \
            --timeframes 15m \
            --days 30
          PYTHONPATH=src python3 scripts/build_warehouse.py \
            --symbols XLF XLK SPY XOP XLB KLAC TLT USO

      - name: Write explicit monitored slices
        run: |
          mkdir -p localdata
          cat > localdata/monitored_slices.csv <<'EOF'
          symbol,timeframe,slice_combination,side,source_note
          XLF,1d,state_ext=stretched_up + state_slope=flat,long,deployed_existing_and_corrected_tier1
          XLK,1d,cross_TLT_state_slope=uptrend + state_ext=neutral,long,deployed_existing
          XLK,1h,cross_USO_state_vol=mid_vol + state_ext=stretched_down,long,deployed_existing
          SPY,1h,state_session=afternoon + state_slope=downtrend,long,deployed_existing
          XOP,1d,state_ext=stretched_down + state_slope=downtrend,long,corrected_liquid236_tier1
          XLB,1d,state_ext=stretched_down + state_slope=downtrend,long,corrected_liquid236_tier1
          KLAC,1d,state_ext=stretched_down + state_slope=downtrend,long,corrected_liquid236_tier1
          EOF

      - name: Run paper_trade (live paper mode, tightly risk-capped)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          # Live PAPER execution only. trading.py is hardwired paper=True.
          # Keep this extremely constrained until the out-of-sample journal is larger.
          PYTHONPATH=src python3 scripts/paper_trade.py \
            --max-notional 2500 \
            --max-open 7 \
            --max-daily-loss 500 \
            --cooldown-seconds 3600

      - name: Run live forward-return capture
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          PYTHONPATH=src python3 scripts/live_forward_returns.py

      - name: Commit any changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # The localdata/ directory is gitignored, which is correct
          # for the parquet files (large binaries) but wrong for the
          # workflow output CSVs that we DO want to commit. Use
          # `git add -f` to bypass the ignore for specific files.
          #
          # This list must match the files the workflow actually
          # produces. If a new output file is added to the pipeline,
          # it must be added here too.
          WORKFLOW_OUTPUT_FILES=(
            "localdata/candidate_leaderboard.csv"
            "localdata/discovered_slices.csv"
            "localdata/paper_trade_log.csv"
            "localdata/trade_journal.csv"
            "localdata/cooldown_journal.json"
            "localdata/HALT_TRADING.flag"
            "localdata/live_forward_returns.csv"
            "localdata/validated_slices.csv"
            "localdata/validation_scenario_grid.csv"
            "localdata/walk_forward_diagnostics.csv"
            "localdata/date_range_diagnostics.csv"
          )
          CHANGED=0
          for f in "${WORKFLOW_OUTPUT_FILES[@]}"; do
            if [ -f "$f" ]; then
              git add -f "$f" && CHANGED=1
            fi
          done
          if [ "$CHANGED" = "0" ]; then
            echo "No workflow output changes; nothing to commit."
            exit 0
          fi
          # Avoid recursive workflow triggers by including [skip ci]
          # in the commit message.
          git commit -m "chore(live-capture): update workflow output CSVs [skip ci]"
          git push
