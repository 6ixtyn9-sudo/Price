name: Live Capture

on:
  schedule:
    - cron: "0 13-21 * * 1-5"
  workflow_dispatch:

concurrency:
  group: live-capture
  cancel-in-progress: true

jobs:
  live-capture:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.lock

      - name: Cache Warehouse Data
        uses: actions/cache@v4
        with:
          path: localdata/warehouse
          key: warehouse-v2-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            warehouse-v2-${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements.lock

      - name: Ingest Universe Data
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          # Use the 'allowlist' tier to keep the bot in sync with your local IDE
          PYTHONPATH=src python3 scripts/capture_bars.py --symbols SPY QQQ IWM DIA GLD TLT USO XLK XLF XLE XOP XLB KLAC --timeframes 1d --days 1825
          PYTHONPATH=src python3 scripts/capture_bars.py --symbols SPY QQQ IWM DIA GLD TLT USO XLK XLF XLE XOP XLB KLAC --timeframes 15m --days 365
          PYTHONPATH=src python3 scripts/build_warehouse.py --symbols SPY QQQ IWM DIA GLD TLT USO XLK XLF XLE XOP XLB KLAC

      - name: Run paper_trade (Using Repository Monitor List)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          # The bot now uses the monitored_slices.csv you pushed from your IDE!
          PYTHONPATH=src python3 scripts/paper_trade.py \
            --max-notional 2500 --max-open 7 --max-daily-loss 500 \
            --cooldown-seconds 3600 --auto-sizing-equity --risk-fraction 0.005 \
            --exit-horizon 5 --max-per-group 2 --stop-atr-mult 2.0 \
            --trail-atr-mult 3.0 --breakeven-trigger-r 1.0 \
            --max-aggregate-risk-pct 0.03 --whipsaw-limit 2 \
            --cost-spread-bps 1.5 --cost-slippage-bps 5.0

      - name: Run live forward-return capture
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          PYTHONPATH=src python3 scripts/live_forward_returns.py --universe-source monitored

      - name: Commit any changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # delta-spike-guard: block auto-commit on runaway row-count growth
          python3 scripts/delta_spike_guard.py
          # Sync everything back to the IDE except the warehouse
          git add localdata/*.csv localdata/*.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "chore(live-capture): update workflow output [skip ci]"
          git push
