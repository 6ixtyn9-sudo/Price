name: Live Capture

# Paper-trading + live-capture workflow, run several times per trading day.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   ALPACA_API_KEY
#   ALPACA_SECRET_KEY
#   TIINGO_API_KEY
#
# What this workflow does:
#   1. Pulls the latest warehouse + paper-trading journals from main.
#   2. Pulls the most recent bars from Tiingo/Alpaca and rebuilds the warehouse.
#   3. Writes the explicit monitored_slices.csv deployment/watch list.
#   4. Runs paper_trade.py in LIVE PAPER mode (never real money).
#      - UPGRADED: Uses Limit Orders and Honest Costs (1.5bp/5.0bp).
#   5. Runs live_forward_returns.py to capture realized forward returns.
#      - UPGRADED: Tiingo/RTH aware with 'auto' universe discovery.
#   6. Auto-commits the lightweight workflow artifacts back to main.
#
# See HANDOVER.md "Paper-Trading Exploration Layer (2026-07-02)",
# "Scheduled Live Capture (2026-07-02)", "Protective Stops (2026-07-06)",
# and "Leverage Phase (2026-07-06)".

on:
  schedule:
    - cron: "0 13-21 * * 1-5"
  workflow_dispatch:

concurrency:
  group: live-capture
  cancel-in-progress: true

jobs:
  live-capture:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.lock

      - name: Install dependencies
        run: |
          python -m pip --version
          pip install --require-hashes -r requirements.lock

      - name: Ingest Universe Data (Tiingo 1d + Alpaca RTH 15m)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          # Fetch 5 years of daily bars (Tiingo adjusted) for the full allowlist
          PYTHONPATH=src python3 scripts/capture_bars.py --tier allowlist --timeframes 1d --days 1825
          # Fetch 14 days of 15m bars (Alpaca RTH) for the full allowlist
          PYTHONPATH=src python3 scripts/capture_bars.py --tier allowlist --timeframes 15m --days 14
          # Build warehouse (resample 1h and propagate adjustments)
          PYTHONPATH=src python3 scripts/build_warehouse.py --tier allowlist

      - name: Write explicit monitored slices
        run: |
          mkdir -p localdata
          cat > localdata/monitored_slices.csv <<'INNER_EOF'
          symbol,timeframe,slice_combination,side,bin_mode,source_note
          XLF,1d,state_ext=stretched_up + state_slope=flat,long,insample,deployed_existing_and_corrected_tier1
          XLK,1d,cross_TLT_state_slope=uptrend + state_ext=neutral,long,insample,deployed_existing
          XLK,1h,cross_USO_state_vol=mid_vol + state_ext=stretched_down,long,insample,deployed_existing
          SPY,1h,state_session=afternoon + state_slope=downtrend,long,insample,deployed_existing
          XOP,1d,state_ext=stretched_down + state_slope=downtrend,long,insample,corrected_liquid236_tier1
          XLB,1d,state_ext=stretched_down + state_slope=downtrend,long,insample,corrected_liquid236_tier1
          KLAC,1d,state_ext=stretched_down + state_slope=downtrend,long,insample,corrected_liquid236_tier1
          INNER_EOF

      - name: Run paper_trade (Limit Orders + Honest Costs)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          PYTHONPATH=src python3 scripts/paper_trade.py \
            --max-notional 2500 --max-open 7 --max-daily-loss 500 \
            --cooldown-seconds 3600 --auto-sizing-equity --risk-fraction 0.005 \
            --exit-horizon 5 --max-per-group 2 --stop-atr-mult 2.0 \
            --trail-atr-mult 3.0 --breakeven-trigger-r 1.0 \
            --max-aggregate-risk-pct 0.03 --whipsaw-limit 2 \
            --cost-spread-bps 1.5 --cost-slippage-bps 5.0 --cost-commission-bps 0.0

      - name: Run live forward-return capture
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          PYTHONPATH=src python3 scripts/live_forward_returns.py --universe-source auto

      - name: Commit any changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          WORKFLOW_OUTPUT_FILES=(
            "localdata/candidate_leaderboard.csv"
            "localdata/discovered_slices.csv"
            "localdata/paper_trade_log.csv"
            "localdata/trade_journal.csv"
            "localdata/cooldown_journal.json"
            "localdata/stop_state.json"
            "localdata/stopout_journal.json"
            "localdata/HALT_TRADING.flag"
            "localdata/live_forward_returns.csv"
            "localdata/validated_slices.csv"
            "localdata/validation_scenario_grid.csv"
            "localdata/walk_forward_diagnostics.csv"
            "localdata/date_range_diagnostics.csv"
          )
          for f in "${WORKFLOW_OUTPUT_FILES[@]}"; do
            if [ -f "$f" ]; then git add -f "$f"; else git rm -f --ignore-unmatch "$f"; fi
          done
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "chore(live-capture): update workflow output [skip ci]"
          git push
