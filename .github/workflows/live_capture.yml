name: Live Capture

# Paper-trading + live-capture workflow, run several times per trading day.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   ALPACA_API_KEY
#   ALPACA_SECRET_KEY
#   TIINGO_API_KEY
#
# What this workflow does:
#   1. Pulls the latest warehouse + paper-trading journals from main.
#   2. Pulls the most recent bars from Tiingo/Alpaca and rebuilds the warehouse.
#   3. Writes the explicit monitored_slices.csv deployment/watch list.
#   4. Runs paper_trade.py in LIVE PAPER mode (never real money; trading.py is hardwired paper=True).
#      This is also where the R-based protective-stop system (attach / breakeven
#      ratchet / chandelier trail) is reconciled every run -- see
#      src/price/stop_manager.py and HANDOVER.md "Protective Stops".
#   5. Runs live_forward_returns.py to capture realized forward returns for any matched signals.
#   6. Auto-commits the lightweight workflow artifacts back to main.
#
# What this workflow does NOT do:
#   - Trade real money.
#   - Override the project doctrine about promotion; paper trades are evidence generation.
#   - Enable the regime deployment gate or any leverage (see the paper_trade step below --
#     both are explicit, not-yet-authorized operator decisions, not silently defaulted on).
#   - Run on its own commits (concurrency block below).
#
# See HANDOVER.md "Paper-Trading Exploration Layer (2026-07-02)",
# "Scheduled Live Capture (2026-07-02)", "Protective Stops (2026-07-06)",
# and "Leverage Phase (2026-07-06)".

on:
  # Runs 5x on each trading day (roughly every 2 hours across the US
  # session) instead of once at close. This matters now that positions
  # carry a REAL broker-side protective stop that ratchets (breakeven at
  # +1R, then a chandelier trail): the stop is continuously enforced by
  # Alpaca regardless of scan cadence, but a WINNING trade's stop only
  # actually MOVES UP the next time this workflow runs and calls
  # stop_manager.reconcile_stops. A once-a-day scan meant a strong
  # intraday move could give back most of its gain before the trail ever
  # caught up. All times UTC; 13:30 ET market open is ~17:30 UTC in
  # winter / ~13:30 UTC in summer (this uses summer/EDT-aligned hours;
  # revisit if the project cares about exact DST alignment).
  # 21:00 UTC (~1hr after US close) is kept as the last run of the day so
  # end-of-day bars are settled before the final reconciliation.
  schedule:
    - cron: "0 14,16,18,20,21 * * 1-5"
  workflow_dispatch:

concurrency:
  group: live-capture
  cancel-in-progress: true

jobs:
  live-capture:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run capture_bars (1d, 5-year history for V4 validation)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          # Pull 1d history for the standard universe. The V4
          # validation discipline requires ~1 year minimum and the
          # clean_survivor tier (the only tier the live forward-
          # return layer tracks) typically needs 3+ years to
          # produce any survivors. We use 5 years to match the
          # V4 cross-asset historical analysis. 1d comes from
          # Tiingo (primary, free tier). build_warehouse.py
          # propagates the daily adjustment factors to intraday.
          PYTHONPATH=src python3 scripts/capture_bars.py \
            --symbols XLF XLK SPY XOP XLB KLAC TLT USO \
            --timeframes 1d \
            --days 1825
          PYTHONPATH=src python3 scripts/build_warehouse.py \
            --symbols XLF XLK SPY XOP XLB KLAC TLT USO

      - name: Run capture_bars (15m, 30-day history for intraday monitoring)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          # Pull 15m history for intraday monitoring only. 30 days
          # is enough for paper_trade.py --dry-run to compute
          # the current 1h state via the resample step. The
          # intraday slices are NOT the live-capture layer's
          # primary research target (XLF 1d is) so a shorter
          # history here is fine and keeps the workflow within
          # its 15-minute timeout.
          PYTHONPATH=src python3 scripts/capture_bars.py \
            --symbols XLF XLK SPY XOP XLB KLAC TLT USO \
            --timeframes 15m \
            --days 30
          PYTHONPATH=src python3 scripts/build_warehouse.py \
            --symbols XLF XLK SPY XOP XLB KLAC TLT USO

      - name: Write explicit monitored slices
        run: |
          mkdir -p localdata
          cat > localdata/monitored_slices.csv <<'EOF'
          symbol,timeframe,slice_combination,side,source_note
          XLF,1d,state_ext=stretched_up + state_slope=flat,long,deployed_existing_and_corrected_tier1
          XLK,1d,cross_TLT_state_slope=uptrend + state_ext=neutral,long,deployed_existing
          XLK,1h,cross_USO_state_vol=mid_vol + state_ext=stretched_down,long,deployed_existing
          SPY,1h,state_session=afternoon + state_slope=downtrend,long,deployed_existing
          XOP,1d,state_ext=stretched_down + state_slope=downtrend,long,corrected_liquid236_tier1
          XLB,1d,state_ext=stretched_down + state_slope=downtrend,long,corrected_liquid236_tier1
          KLAC,1d,state_ext=stretched_down + state_slope=downtrend,long,corrected_liquid236_tier1
          EOF

      - name: Run paper_trade (live paper mode, tightly risk-capped)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          # Live PAPER execution only. trading.py is hardwired paper=True.
          # Keep this extremely constrained until the out-of-sample journal is larger.
          #
          # Every flag below is passed EXPLICITLY (even where it matches the
          # CLI's own default) so a future change to the code's default
          # cannot silently change deployed behaviour without showing up as
          # a diff in this file.
          #
          # --auto-sizing-equity is enabled: it activates the sizing
          # volatility rail (Stage B) and the aggregate open-risk budget,
          # both of which are STRICTLY TIGHTENING mechanisms (qty is always
          # min() against them; the aggregate-risk check can only BLOCK,
          # never enlarge, a trade) -- so turning this on cannot loosen the
          # live book's risk versus today, only make it more honest about
          # real ATR-based risk. See HANDOVER.md "Protective Stops".
          #
          # --regime-filter and --target-leverage are DELIBERATELY NOT set
          # here. Both are net-new policy decisions (which slices to gate
          # on macro regime; whether/how much to leverage the book), not
          # bug fixes, and this project's doctrine treats that class of
          # decision as an explicit operator call -- see the "Operator
          # action items" note in HANDOVER.md's regime-gate and
          # leverage-phase sections. Add them here only after that sign-off.
          PYTHONPATH=src python3 scripts/paper_trade.py \
            --max-notional 2500 \
            --max-open 7 \
            --max-daily-loss 500 \
            --cooldown-seconds 3600 \
            --auto-sizing-equity \
            --risk-fraction 0.005 \
            --exit-horizon 5 \
            --max-per-group 2 \
            --stop-atr-mult 2.0 \
            --trail-atr-mult 3.0 \
            --breakeven-trigger-r 1.0 \
            --max-aggregate-risk-pct 0.03 \
            --whipsaw-limit 2 \
            --cost-spread-bps 1.0 \
            --cost-slippage-bps 3.0 \
            --cost-commission-bps 0.0

      - name: Run live forward-return capture
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          PYTHONPATH=src python3 scripts/live_forward_returns.py

      - name: Commit any changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # The localdata/ directory is gitignored, which is correct
          # for the parquet files (large binaries) but wrong for the
          # workflow output CSVs/JSON state that we DO want to commit.
          # Use `git add -f` to bypass the ignore for specific files.
          #
          # This list must match the files the workflow actually
          # produces. If a new output file is added to the pipeline,
          # it must be added here too.
          #
          # stop_state.json / stopout_journal.json are CRITICAL to include:
          # without them, every fresh checkout would start with an EMPTY
          # protective-stop state, so the R-state (entry stop, breakeven/
          # trailing ratchet progress) for every open position would
          # silently reset to "no tracked stop" on each run, and
          # stop_manager.reconcile_stops would re-attach a brand-new
          # INITIAL stop at the CURRENT price every time instead of
          # continuing the ratchet -- quietly defeating "small losses,
          # large profits" without any error ever being raised.
          WORKFLOW_OUTPUT_FILES=(
            "localdata/candidate_leaderboard.csv"
            "localdata/discovered_slices.csv"
            "localdata/paper_trade_log.csv"
            "localdata/trade_journal.csv"
            "localdata/cooldown_journal.json"
            "localdata/stop_state.json"
            "localdata/stopout_journal.json"
            "localdata/HALT_TRADING.flag"
            "localdata/live_forward_returns.csv"
            "localdata/validated_slices.csv"
            "localdata/validation_scenario_grid.csv"
            "localdata/walk_forward_diagnostics.csv"
            "localdata/date_range_diagnostics.csv"
          )
          for f in "${WORKFLOW_OUTPUT_FILES[@]}"; do
            if [ -f "$f" ]; then
              git add -f "$f"
            else
              # Stage deletions too. This is critical for state files such as
              # stop_state.json and HALT_TRADING.flag: if a workflow run clears
              # one locally but the deletion is not committed, the next fresh
              # checkout resurrects stale state and the live book can repeatedly
              # replay an already-cleared stop/halt condition.
              git rm -f --ignore-unmatch "$f"
            fi
          done
          if git diff --cached --quiet; then
            echo "No workflow output changes; nothing to commit."
            exit 0
          fi
          # Avoid recursive workflow triggers by including [skip ci]
          # in the commit message.
          git commit -m "chore(live-capture): update workflow output CSVs [skip ci]"
          git push
