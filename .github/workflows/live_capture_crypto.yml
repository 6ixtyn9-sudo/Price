name: Live Capture Crypto (Dynamic)

on:
  workflow_dispatch:
    inputs:
      max_notional:
        description: "Max notional per crypto position"
        required: false
        default: "500"
      max_open:
        description: "Max open crypto positions"
        required: false
        default: "3"
      max_daily_loss:
        description: "Daily loss kill switch"
        required: false
        default: "200"

concurrency:
  group: live-capture-crypto
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PYTHONPATH: src:scripts
  MONITORED_SLICES_PATH: localdata/monitored_slices_crypto.csv
  TRADE_JOURNAL_PATH: localdata/trade_journal_crypto.csv
  PAPER_TRADE_LOG_PATH: localdata/paper_trade_log_crypto.csv
  STOP_STATE_PATH: localdata/stop_state_crypto.json
  STOPOUT_JOURNAL_PATH: localdata/stopout_journal_crypto.json
  COOLDOWN_JOURNAL_PATH: localdata/cooldown_journal_crypto.json
  HALT_FLAG_PATH: localdata/HALT_TRADING_CRYPTO.flag
  CANDIDATE_LEADERBOARD_PATH: localdata/research/crypto/candidate_leaderboard_crypto_rolling.csv
  LIVE_FORWARD_RETURNS_PATH: localdata/live_forward_returns_crypto.csv

jobs:
  live-capture-crypto:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: write
      actions: write # needed to prune stale caches in the last step

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.lock

      - name: Compute cache key
        id: cache_key
        run: echo "key=research-warehouse-v4-${{ runner.os }}-live-capture-crypto-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Restore warehouse cache
        id: warehouse
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: localdata/warehouse
          key: ${{ steps.cache_key.outputs.key }}
          restore-keys: |
            research-warehouse-v4-${{ runner.os }}-

      - name: Seed warehouse from release if cache empty
        if: steps.warehouse.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -d localdata/warehouse ] && [ "$(find localdata/warehouse -name '*.parquet' | wc -l 2>/dev/null | tr -d ' ')" -gt 10 ]; then
            echo "Warehouse has data"
            exit 0
          fi
          SEED_TAG="${WAREHOUSE_SEED_TAG:-warehouse-v1}"
          if gh release view "$SEED_TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            mkdir -p localdata
            gh release download "$SEED_TAG" --repo "$GITHUB_REPOSITORY" --pattern 'warehouse-research.tar.gz' --dir /tmp --clobber || true
            if [ -f /tmp/warehouse-research.tar.gz ]; then
              tar xzf /tmp/warehouse-research.tar.gz -C localdata
              rm /tmp/warehouse-research.tar.gz
            fi
          fi

      - name: Restore operational paper state cache (crypto)
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            localdata/trade_journal_crypto.csv
            localdata/paper_trade_log_crypto.csv
            localdata/stop_state_crypto.json
            localdata/stopout_journal_crypto.json
            localdata/cooldown_journal_crypto.json
            localdata/monitored_slices_crypto.csv
            localdata/research/crypto
          key: live-ops-state-crypto-v1-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            live-ops-state-crypto-v1-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock

      - name: Verify required secrets
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          : "${ALPACA_API_KEY:?Missing ALPACA_API_KEY}"
          : "${ALPACA_SECRET_KEY:?Missing ALPACA_SECRET_KEY}"

      - name: Guard against tracked secrets
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo "::error::.env tracked"
            exit 1
          fi

      - name: Sync dynamic crypto book from latest research
        run: |
          echo "=== Syncing dynamic crypto book ==="
          # Try merged root first, then 1d scoped, then existing file
          for RESEARCH_DIR in localdata/research/crypto localdata/research/crypto/1d; do
            if [ -f "$RESEARCH_DIR/candidate_leaderboard_crypto_rolling.csv" ]; then
              echo "Found research in $RESEARCH_DIR, rebuilding monitored candidates"
              python scripts/research_crypto.py --timeframes 1d --regime-only --output-dir "$RESEARCH_DIR" || echo "regime-only rebuild failed for $RESEARCH_DIR"
              if [ -f "$RESEARCH_DIR/monitored_candidates_crypto.csv" ] && [ -s "$RESEARCH_DIR/monitored_candidates_crypto.csv" ]; then
                echo "Using $RESEARCH_DIR/monitored_candidates_crypto.csv as live book"
                python scripts/sync_monitored_crypto.py --candidates-path "$RESEARCH_DIR/monitored_candidates_crypto.csv" --output-path localdata/monitored_slices_crypto.csv && break
              fi
            fi
          done
          # Fallback to clean_mixed if still empty
          if [ ! -s localdata/monitored_slices_crypto.csv ]; then
            echo "monitored_candidates empty, trying fallback clean_mixed"
            for LB in localdata/research/crypto/candidate_leaderboard_crypto_rolling.csv localdata/research/crypto/1d/candidate_leaderboard_crypto_rolling.csv; do
              if [ -f "$LB" ]; then
                python scripts/sync_monitored_crypto.py --fallback-clean-mixed --leaderboard-path "$LB" --output-path localdata/monitored_slices_crypto.csv && break
              fi
            done
          fi
          ls -lh localdata/monitored_slices_crypto.csv || echo "no crypto book yet"
          echo "Current crypto book:"
          cat localdata/monitored_slices_crypto.csv 2>/dev/null | head -20 || echo "no book"

      - name: Ingest crypto universe (automatic 1d + 15m for 1h)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          if [ -f localdata/monitored_slices_crypto.csv ]; then
            SYMBOLS=$(python3 -c "import pandas as pd, os, sys; df=pd.read_csv('localdata/monitored_slices_crypto.csv'); print(' '.join(sorted(df['symbol'].unique()))) if not df.empty else ''; " )
          else
            SYMBOLS=$(python3 -c "import importlib.util, sys; spec = importlib.util.spec_from_file_location('research_crypto', 'scripts/research_crypto.py'); mod = importlib.util.module_from_spec(spec); spec.loader.exec_module(mod); print(' '.join(mod.load_crypto_symbols()))")
          fi
          if [ -z "$SYMBOLS" ]; then SYMBOLS="BTC/USD ETH/USD SOL/USD AVAX/USD DOT/USD"; fi
          echo "Capturing crypto for: $SYMBOLS BTC/USD ETH/USD"
          python scripts/capture_bars.py --symbols $SYMBOLS BTC/USD ETH/USD --timeframes 1d --days 1825 --skip-postprocess
          python scripts/capture_bars.py --symbols $SYMBOLS BTC/USD ETH/USD --timeframes 15m --days 365

      - name: Run paper trade crypto (dynamic book)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          python scripts/paper_trade.py \
            --max-notional ${{ inputs.max_notional || '500' }} \
            --max-open ${{ inputs.max_open || '3' }} \
            --max-daily-loss ${{ inputs.max_daily_loss || '200' }} \
            --cooldown-seconds 3600 --auto-sizing-equity --risk-fraction 0.005 \
            --exit-horizon 5 --max-per-group 1 --stop-atr-mult 2.0 \
            --trail-atr-mult 3.0 --breakeven-trigger-r 1.0 \
            --max-aggregate-risk-pct 0.02 --whipsaw-limit 2 \
            --cost-spread-bps 5.0 --cost-slippage-bps 10.0 --allow-shorts \
            --take-profit-r 3.0 \
            --eod-profit-lock-r 0 \
            --giveback-trigger-r 2.0 \
            --max-giveback-r 1.0

      - name: Run live forward-return capture crypto
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          python scripts/live_forward_returns.py --universe-source monitored

      - name: Guard against row-count spikes (fail-closed)
        run: |
          python scripts/delta_spike_guard.py

      - name: Check operational paper state cache content
        id: ops_state
        run: |
          shopt -s nullglob
          files=(localdata/trade_journal_crypto.csv localdata/paper_trade_log_crypto.csv localdata/stop_state_crypto.json localdata/stopout_journal_crypto.json localdata/cooldown_journal_crypto.json localdata/monitored_slices_crypto.csv)
          echo "has_state=false" >> "$GITHUB_OUTPUT"
          for f in "${files[@]}"; do if [ -s "$f" ]; then echo "has_state=true" >> "$GITHUB_OUTPUT"; break; fi; done

      - name: Save operational paper state cache (crypto)
        if: ${{ steps.ops_state.outputs.has_state == 'true' }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            localdata/trade_journal_crypto.csv
            localdata/paper_trade_log_crypto.csv
            localdata/stop_state_crypto.json
            localdata/stopout_journal_crypto.json
            localdata/cooldown_journal_crypto.json
            localdata/monitored_slices_crypto.csv
            localdata/research/crypto
          key: live-ops-state-crypto-v1-${{ runner.os }}-${{ github.run_id }}

      - name: Save research warehouse cache
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: localdata/warehouse
          key: ${{ steps.cache_key.outputs.key }}

      - name: Commit crypto workflow outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          files=(localdata/live_forward_returns_crypto.csv localdata/monitored_slices_crypto.csv localdata/research/crypto/monitored_candidates_crypto.csv localdata/research/crypto/1d/monitored_candidates_crypto.csv)
          existing=()
          for f in "${files[@]}"; do [ -e "$f" ] && existing+=("$f"); done
          if ((${#existing[@]})); then git add "${existing[@]}"; fi
          if git diff --cached --quiet; then echo "No crypto output changes"; exit 0; fi
          git commit -m "chore(live-capture-crypto): update workflow output [skip ci]"
          # Queue-safe commit: retry with exponential backoff, no force-with-lease race
          for attempt in 1 2 3 4 5; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" || sleep 5
            git push || sleep $((5*attempt))
            if [ $? -eq 0 ]; then break; fi
          done

      # Repo-wide cleanup: roll off stale run_id-suffixed warehouse/ops-state caches
      # so the 10 GiB cache quota never evicts the pip or ops-state caches.
      - name: Prune superseded caches (keep newest 2 per key family)
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --paginate "repos/$GITHUB_REPOSITORY/actions/caches?per_page=100" \
            --jq '.actions_caches[] | [.id, .key, .ref, .created_at] | @tsv' |
          awk -F'\t' -v OFS='\t' '
            $2 ~ /^(research-warehouse-v4|live-ops-state|requirement-deps|futures-|crypto-)/ {
              k=$2
              sub(/-[0-9a-f]{32,64}$/, "", k)   # content-hash suffix
              sub(/-[0-9]{4}-[0-9]{2}-[0-9]{2}$/, "", k)  # date suffix
              sub(/-[0-9]{6,}$/, "", k)         # run_id suffix
              print $3 "|" k, $4, $1, $2
            }' |
          sort -t$'\t' -k1,1 -k2,2r |
          awk -F'\t' 'seen[$1]++ >= 2 { print $3 }' > prune_ids.txt
          while read -r id; do
            echo "::notice::pruning stale cache id=$id"
            gh api -X DELETE "repos/$GITHUB_REPOSITORY/actions/caches/$id"
          done < prune_ids.txt
          echo "cache prune complete: $(wc -l < prune_ids.txt) stale cache(s) deleted (newest 2 per family kept)"
