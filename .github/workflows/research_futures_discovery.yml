name: Research Futures Discovery Shards

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Canonical futures symbols to research (space-separated, optional)"
        required: false
        default: ""
      batch_size:
        description: "Symbols per shard"
        required: false
        default: "5"
      timeframes:
        description: "Timeframes to research"
        required: false
        default: "1d 1h"
  workflow_call:
    inputs:
      symbols:
        required: false
        type: string
        default: ""
      batch_size:
        required: false
        type: string
        default: "5"
      timeframes:
        required: false
        type: string
        default: "1d 1h"
      parent_run_id:
        required: false
        type: string
        default: manual

concurrency:
  group: research-futures-discovery
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  PYTHONPATH: src

jobs:
  plan:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      shard_ids: ${{ steps.plan.outputs.shard_ids }}
      symbols_value: ${{ steps.plan.outputs.symbols_value }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.lock

      - name: Compute research warehouse cache key
        id: cache_key
        run: echo "key=research-warehouse-v4-${{ runner.os }}-futures-discovery-${{ github.run_id }}\" >> \"$GITHUB_OUTPUT\"

      - name: Restore warehouse cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: localdata/warehouse
          key: ${{ steps.cache_key.outputs.key }}
          restore-keys: |
            research-warehouse-v4-${{ runner.os }}-

      - name: Seed warehouse from release if cache empty
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -d localdata/warehouse ] && [ "$(find localdata/warehouse -name '*.parquet' | wc -l)" -gt 0 ]; then
            echo "Warehouse already populated"
            exit 0
          fi
          SEED_TAG="${WAREHOUSE_SEED_TAG:-warehouse-v1}"
          if gh release view "$SEED_TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            mkdir -p localdata
            gh release download "$SEED_TAG" --repo "$GITHUB_REPOSITORY" --pattern 'warehouse-research.tar.gz' --dir /tmp --clobber
            tar xzf /tmp/warehouse-research.tar.gz -C localdata
            rm /tmp/warehouse-research.tar.gz
            echo "Seeded $(find localdata/warehouse -name '*.parquet' | wc -l) parquet files"
          else
            echo "No seed release $SEED_TAG"
          fi

      - name: Restore operational paper state cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            localdata/trade_journal.csv
            localdata/paper_trade_log.csv
            localdata/stop_state.json
            localdata/stopout_journal.json
            localdata/cooldown_journal.json
          key: live-ops-state-v1-${{ runner.os }}-futures-${{ github.run_id }}
          restore-keys: |
            live-ops-state-v1-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock

      - name: Guard against tracked secrets
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo "::error::.env tracked"
            exit 1
          fi

      - name: Build futures shard plan
        id: plan
        env:
          INPUT_SYMBOLS: ${{ inputs.symbols }}
          INPUT_TIMEFRAMES: ${{ inputs.timeframes }}
          BATCH_SIZE: ${{ inputs.batch_size }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import re
          import sys
          from pathlib import Path

          sys.path.insert(0, str(Path('src').resolve()))
          from price.futures_metadata import get_research_futures_symbols

          symbol_pattern = re.compile(r"^[A-Z0-9][A-Z0-9.\-]{0,14}(/[A-Z0-9][A-Z0-9.\-]{0,14})?$" )
          if os.environ.get("INPUT_SYMBOLS", "").strip():
              symbols = [s.strip().upper() for s in os.environ["INPUT_SYMBOLS"].split() if s.strip()]
          else:
              symbols = get_research_futures_symbols()
          invalid = [s for s in symbols if not symbol_pattern.fullmatch(s)]
          if invalid:
              raise SystemExit("Invalid futures symbols: " + ", ".join(invalid[:10]))
          batch_size = int(os.environ["BATCH_SIZE"])
          timeframes = [t for t in os.environ.get("INPUT_TIMEFRAMES", "1d 1h").split() if t]
          include = []
          for timeframe in timeframes:
              for offset in range(0, len(symbols), batch_size):
                  batch = symbols[offset:offset + batch_size]
                  index = offset // batch_size
                  include.append({
                      "shard_id": f"futures-{timeframe}-{index:02d}",
                      "timeframe": timeframe,
                      "symbols_json": json.dumps(batch, separators=(",", ":")),
                  })
          print("matrix=" + json.dumps({"include": include}, separators=(",", ":")))
          print("shard_ids=" + json.dumps([item["shard_id"] for item in include]))
          print("symbols_value=" + " ".join(symbols))
          PY

  shards:
    needs: plan
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.lock

      - name: Compute research warehouse cache key
        id: cache_key
        run: echo "key=research-warehouse-v4-${{ runner.os }}-futures-discovery-${{ github.run_id }}\" >> \"$GITHUB_OUTPUT\"

      - name: Restore warehouse cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: localdata/warehouse
          key: ${{ steps.cache_key.outputs.key }}
          restore-keys: |
            research-warehouse-v4-${{ runner.os }}-

      - name: Seed warehouse if empty (shard)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -d localdata/warehouse ] && [ "$(find localdata/warehouse -name '*.parquet' | wc -l)" -gt 0 ]; then exit 0; fi
          SEED_TAG="${WAREHOUSE_SEED_TAG:-warehouse-v1}"
          if gh release view "$SEED_TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            mkdir -p localdata
            gh release download "$SEED_TAG" --repo "$GITHUB_REPOSITORY" --pattern 'warehouse-research.tar.gz' --dir /tmp --clobber || true
            if [ -f /tmp/warehouse-research.tar.gz ]; then tar xzf /tmp/warehouse-research.tar.gz -C localdata; rm /tmp/warehouse-research.tar.gz; fi
          fi

      - name: Restore operational paper state cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            localdata/trade_journal.csv
            localdata/paper_trade_log.csv
            localdata/stop_state.json
            localdata/stopout_journal.json
            localdata/cooldown_journal.json
          key: live-ops-state-v1-${{ runner.os }}-futures-${{ github.run_id }}
          restore-keys: |
            live-ops-state-v1-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock

      - name: Guard against tracked secrets
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo "::error::.env tracked"
            exit 1
          fi

      - name: Verify required secrets
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          : "${ALPACA_API_KEY:?Missing repository secret ALPACA_API_KEY}"
          : "${ALPACA_SECRET_KEY:?Missing repository secret ALPACA_SECRET_KEY}"

      - name: Capture futures data (automatic for 1d and 1h)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          SHARD_SYMBOLS_JSON: ${{ matrix.symbols_json }}
        run: |
          SYMBOLS=$(python3 -c "import json,os; print(' '.join(json.loads(os.environ['SHARD_SYMBOLS_JSON'])))" )
          echo "Capturing $SYMBOLS for timeframe ${{ matrix.timeframe }}"
          python scripts/capture_bars.py --symbols $SYMBOLS --timeframes ${{ matrix.timeframe }} --days 365

      - name: Run futures shard
        env:
          SHARD_SYMBOLS_JSON: ${{ matrix.symbols_json }}
        run: |
          python scripts/research_shard.py \
            --shard-id "${{ matrix.shard_id }}" \
            --timeframe "${{ matrix.timeframe }}" \
            --symbols-json "$SHARD_SYMBOLS_JSON" \
            --output-dir "localdata/research/futures/shards/${{ matrix.shard_id }}" \
            --bin-mode rolling \
            --profile futures

      - name: Check operational paper state cache content
        id: ops_state
        run: |
          shopt -s nullglob
          files=(localdata/trade_journal.csv localdata/paper_trade_log.csv localdata/stop_state.json localdata/stopout_journal.json localdata/cooldown_journal.json)
          echo "has_state=false" >> "$GITHUB_OUTPUT"
          for f in "${files[@]}"; do if [ -s "$f" ]; then echo "has_state=true" >> "$GITHUB_OUTPUT"; break; fi; done

      - name: Save operational paper state cache
        if: ${{ steps.ops_state.outputs.has_state == 'true' }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            localdata/trade_journal.csv
            localdata/paper_trade_log.csv
            localdata/stop_state.json
            localdata/stopout_journal.json
            localdata/cooldown_journal.json
          key: live-ops-state-v1-${{ runner.os }}-futures-${{ github.run_id }}

      - name: Save research warehouse cache
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: localdata/warehouse
          key: ${{ steps.cache_key.outputs.key }}

      - name: Upload shard output
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: futures-shard-${{ matrix.shard_id }}
          path: localdata/research/futures/shards/${{ matrix.shard_id }}
          if-no-files-found: error
          retention-days: 14

  merge:
    needs: [plan, shards]
    if: ${{ needs.shards.result == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.lock

      - name: Restore warehouse cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: localdata/warehouse
          key: research-warehouse-v4-${{ runner.os }}-futures-discovery-merged-${{ github.run_id }}
          restore-keys: |
            research-warehouse-v4-${{ runner.os }}-

      - name: Restore operational paper state cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            localdata/trade_journal.csv
            localdata/paper_trade_log.csv
            localdata/stop_state.json
            localdata/stopout_journal.json
            localdata/cooldown_journal.json
          key: live-ops-state-v1-${{ runner.os }}-futures-merged-${{ github.run_id }}
          restore-keys: |
            live-ops-state-v1-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock

      - name: Guard against tracked secrets
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo "::error::.env tracked"
            exit 1
          fi

      - name: Download shards
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: futures-shard-*
          path: localdata/research/futures/shards
          merge-multiple: false

      - name: Write expected shard manifest
        env:
          SHARD_IDS: ${{ needs.plan.outputs.shard_ids }}
        run: |
          mkdir -p localdata/research/futures
          echo '{"shard_ids":'"$SHARD_IDS"'}' > localdata/research/futures/expected_shards.json

      - name: Merge futures shards
        run: |
          python scripts/research_merge.py \
            --shard-root localdata/research/futures/shards \
            --expected-shards localdata/research/futures/expected_shards.json \
            --output-dir localdata/research/futures

      - name: Run regime-only futures post-processing on merged artifacts
        run: |
          python scripts/research_futures.py \
            --symbols ${{ needs.plan.outputs.symbols_value }} \
            --timeframes ${{ inputs.timeframes }} \
            --regime-only \
            --output-dir localdata/research/futures

      - name: Run date-range diagnostics on merged top 25 (main-like)
        run: |
          python scripts/validate_slices.py \
            --slices-path localdata/research/futures/candidate_leaderboard_futures_rolling.csv \
            --date-range-diagnostics \
            --diagnostic-scope leaderboard-top --top-n 25 --bin-mode rolling

      - name: Run regime-stratified diagnostics on merged top 25 (main-like)
        run: |
          python scripts/validate_slices.py \
            --slices-path localdata/research/futures/candidate_leaderboard_futures_rolling.csv \
            --regime-stratified-diagnostics \
            --diagnostic-scope leaderboard-top --top-n 25 --bin-mode rolling

      - name: Report monitored candidates (gate check)
        run: |
          echo "=== Futures monitored candidates ==="
          if [ -f localdata/research/futures/monitored_candidates_futures.csv ]; then
            wc -l localdata/research/futures/monitored_candidates_futures.csv
            head -20 localdata/research/futures/monitored_candidates_futures.csv
          else
            echo "monitored_candidates_futures.csv missing!"
            exit 1
          fi

      - name: Upload merged futures research artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: research-futures-merged-artifacts
          path: localdata/research/futures
          if-no-files-found: error
          retention-days: 14
