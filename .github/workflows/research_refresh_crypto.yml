name: Research Refresh Crypto

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Symbols per shard for discovery dispatch"
        required: false
        default: "5"
      timeframes:
        description: "Timeframes to refresh (space-separated)"
        required: false
        default: "1d 1h"
      min_new_daily_bars:
        description: "Minimum new daily bars per symbol for discovery gate"
        required: false
        default: "5"
      allow_discovery:
        description: "Allow discovery to run if gate opens"
        required: false
        default: true
        type: boolean
      condition_on:
        description: "Conditioning symbols (space-separated)"
        required: false
        default: "BTC/USD ETH/USD"

concurrency:
  group: research-refresh-crypto
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PYTHONPATH: src
  MONITORED_SLICES_PATH: localdata/monitored_slices_crypto.csv
  TRADE_JOURNAL_PATH: localdata/trade_journal_crypto.csv
  PAPER_TRADE_LOG_PATH: localdata/paper_trade_log_crypto.csv
  STOP_STATE_PATH: localdata/stop_state_crypto.json
  STOPOUT_JOURNAL_PATH: localdata/stopout_journal_crypto.json
  COOLDOWN_JOURNAL_PATH: localdata/cooldown_journal_crypto.json
  CANDIDATE_LEADERBOARD_PATH: localdata/research/crypto/1d/candidate_leaderboard_crypto_rolling.csv

jobs:
  research-refresh-crypto:
    runs-on: ubuntu-24.04
    timeout-minutes: 300
    permissions:
      contents: write
    outputs:
      should_dispatch_discovery: ${{ steps.dispatch_gate.outputs.should_dispatch }}
      cache_key: ${{ steps.cache_key.outputs.key }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.lock

      - name: Compute research warehouse cache key
        id: cache_key
        run: echo "key=research-warehouse-v4-${{ runner.os }}-crypto-refresh-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Restore warehouse cache
        id: warehouse
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: localdata/warehouse
          key: ${{ steps.cache_key.outputs.key }}
          restore-keys: |
            research-warehouse-v4-${{ runner.os }}-

      - name: Seed warehouse from release if cache empty
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -d localdata/warehouse ] && [ "$(find localdata/warehouse -name '*.parquet' -path '*BTC*' | wc -l)" -gt 0 ]; then
            echo "Warehouse has crypto data from cache."
            exit 0
          fi
          SEED_TAG="${WAREHOUSE_SEED_TAG:-warehouse-v1}"
          if gh release view "$SEED_TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            mkdir -p localdata
            gh release download "$SEED_TAG" --repo "$GITHUB_REPOSITORY" --pattern 'warehouse-research.tar.gz' --dir /tmp --clobber || true
            if [ -f /tmp/warehouse-research.tar.gz ]; then
              tar xzf /tmp/warehouse-research.tar.gz -C localdata
              rm /tmp/warehouse-research.tar.gz
            fi
          else
            echo "No seed release $SEED_TAG"
          fi

      - name: Restore operational state cache (crypto)
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            localdata/trade_journal_crypto.csv
            localdata/paper_trade_log_crypto.csv
            localdata/stop_state_crypto.json
            localdata/stopout_journal_crypto.json
            localdata/cooldown_journal_crypto.json
            localdata/monitored_slices_crypto.csv
            localdata/research/crypto
          key: live-ops-state-crypto-v1-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            live-ops-state-crypto-v1-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock

      - name: Verify required secrets
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          : "${ALPACA_API_KEY:?Missing ALPACA_API_KEY}"
          : "${ALPACA_SECRET_KEY:?Missing ALPACA_SECRET_KEY}"

      - name: Guard against tracked secrets
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo "::error::.env tracked"
            exit 1
          fi

      - name: Capture full crypto universe (yfinance primary)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          # 1d long history via yfinance primary (BTC-USD etc), 15m for 1h derivation
          python scripts/capture_bars.py --symbols BTC/USD ETH/USD SOL/USD AVAX/USD DOT/USD AAVE/USD DOGE/USD UNI/USD LINK/USD LTC/USD XRP/USD CRV/USD BCH/USD SUSHI/USD ADA/USD --timeframes 1d --days 1825 --skip-postprocess
          python scripts/capture_bars.py --symbols BTC/USD ETH/USD SOL/USD AVAX/USD DOT/USD AAVE/USD DOGE/USD UNI/USD LINK/USD LTC/USD XRP/USD CRV/USD BCH/USD SUSHI/USD ADA/USD --timeframes 15m --days 365

      - name: Run autonomous research controller (crypto)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          # Rebuild regime-aware candidates from existing artifacts (dynamic, not static)
          # This is the crypto equivalent of research_refresh.py's fresh-data gate – we count new daily bars
          python scripts/research_crypto.py --timeframes 1d --regime-only --output-dir localdata/research/crypto/1d || echo "no 1d research artifacts yet, will build after first discovery"
          python scripts/sync_monitored_crypto.py --fallback-clean-mixed --output-path localdata/monitored_slices_crypto.csv || true
          ls -lh localdata/monitored_slices_crypto.csv || echo "no crypto book yet"

      - name: Build research manifest
        run: |
          mkdir -p localdata/research
          NOW=$(date -u +%Y-%m-%dT%H:%M:%S+00:00)
          echo "{\"workflow\":\"research_refresh_crypto\",\"generated_at_utc\":\"$NOW\",\"orders_placed\":false,\"monitored_slices_modified\":false}" | jq . > /tmp/manifest.json
          cat /tmp/manifest.json
          # merge into refresh_state if exists
          if [ -f localdata/research/crypto/1d/crypto_research_summary.json ]; then
            cat localdata/research/crypto/1d/crypto_research_summary.json | jq . | head -20
          fi

      - name: Compute discovery dispatch gate (fresh data)
        id: dispatch_gate
        run: |
          # Simple gate: if at least 5 new daily bars across 50% symbols since last refresh, open gate
          # For now, always allow dispatch if allow_discovery=true and no recent discovery in last 24h
          # This mirrors main's fresh_data_gate_open logic but simplified for crypto
          if [ "${{ inputs.allow_discovery }}" = "true" ]; then
            echo "should_dispatch=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_dispatch=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check operational state cache content
        id: ops_state
        run: |
          shopt -s nullglob
          files=(localdata/research/crypto/1d/candidate_leaderboard_crypto_rolling.csv localdata/monitored_slices_crypto.csv)
          echo "has_state=false" >> "$GITHUB_OUTPUT"
          for f in "${files[@]}"; do if [ -s "$f" ]; then echo "has_state=true" >> "$GITHUB_OUTPUT"; break; fi; done

      - name: Save operational state cache (crypto)
        if: ${{ steps.ops_state.outputs.has_state == 'true' }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            localdata/research/crypto
            localdata/monitored_slices_crypto.csv
          key: live-ops-state-crypto-v1-${{ runner.os }}-${{ github.run_id }}

      - name: Save research warehouse cache
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: localdata/warehouse
          key: ${{ steps.cache_key.outputs.key }}

  dispatch-discovery:
    needs: research-refresh-crypto
    if: ${{ needs.research-refresh-crypto.outputs.should_dispatch_discovery == 'true' }}
    uses: ./.github/workflows/research_crypto_discovery.yml
    with:
      timeframes: "1d 1h"
      batch_size: "5"
      condition_on: "BTC/USD ETH/USD"
    secrets: inherit
