name: Research Refresh Crypto

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Symbols per shard for discovery dispatch"
        required: false
        default: "5"
      timeframes:
        description: "Timeframes to refresh (space-separated)"
        required: false
        default: "1d 1h"
      min_new_daily_bars:
        description: "Minimum new daily bars per symbol for discovery gate"
        required: false
        default: "5"
      allow_discovery:
        description: "Allow discovery to run if gate opens"
        required: false
        default: true
        type: boolean
      condition_on:
        description: "Conditioning symbols (space-separated)"
        required: false
        default: "BTC/USD ETH/USD"

concurrency:
  group: research-refresh-crypto
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PYTHONPATH: src
  MONITORED_SLICES_PATH: localdata/monitored_slices_crypto.csv
  TRADE_JOURNAL_PATH: localdata/trade_journal_crypto.csv
  PAPER_TRADE_LOG_PATH: localdata/paper_trade_log_crypto.csv
  STOP_STATE_PATH: localdata/stop_state_crypto.json
  STOPOUT_JOURNAL_PATH: localdata/stopout_journal_crypto.json
  COOLDOWN_JOURNAL_PATH: localdata/cooldown_journal_crypto.json
  CANDIDATE_LEADERBOARD_PATH: localdata/research/crypto/candidate_leaderboard_crypto_rolling.csv

jobs:
  research-refresh-crypto:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      contents: write
    outputs:
      should_dispatch_discovery: ${{ steps.dispatch_gate.outputs.should_dispatch }}
      cache_key: ${{ steps.cache_key.outputs.key }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.lock

      - name: Compute research warehouse cache key
        id: cache_key
        run: echo "key=research-warehouse-v4-${{ runner.os }}-crypto-refresh-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Restore warehouse cache
        id: warehouse
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: localdata/warehouse
          key: ${{ steps.cache_key.outputs.key }}
          restore-keys: |
            research-warehouse-v4-${{ runner.os }}-

      - name: Seed warehouse from release if cache empty
        if: steps.warehouse.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -d localdata/warehouse ] && [ "$(find localdata/warehouse -name '*.parquet' -path '*BTC*' 2>/dev/null | wc -l)" -gt 0 ]; then
            echo "Warehouse has crypto data from cache."
            exit 0
          fi
          SEED_TAG="${WAREHOUSE_SEED_TAG:-warehouse-v1}"
          if gh release view "$SEED_TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            mkdir -p localdata
            gh release download "$SEED_TAG" --repo "$GITHUB_REPOSITORY" --pattern 'warehouse-research.tar.gz' --dir /tmp --clobber || true
            if [ -f /tmp/warehouse-research.tar.gz ]; then
              tar xzf /tmp/warehouse-research.tar.gz -C localdata
              rm /tmp/warehouse-research.tar.gz
              echo "Seeded warehouse"
            fi
          else
            echo "No seed release $SEED_TAG"
          fi

      - name: Restore operational state cache (crypto)
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            localdata/trade_journal_crypto.csv
            localdata/paper_trade_log_crypto.csv
            localdata/stop_state_crypto.json
            localdata/stopout_journal_crypto.json
            localdata/cooldown_journal_crypto.json
            localdata/monitored_slices_crypto.csv
            localdata/research/crypto
          key: live-ops-state-crypto-v1-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            live-ops-state-crypto-v1-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock

      - name: Verify required secrets
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          : "${ALPACA_API_KEY:?Missing ALPACA_API_KEY}"
          : "${ALPACA_SECRET_KEY:?Missing ALPACA_SECRET_KEY}"

      - name: Guard against tracked secrets
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo "::error::.env tracked"
            exit 1
          fi

      - name: Capture full crypto universe (yfinance primary)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          python scripts/capture_bars.py --symbols BTC/USD ETH/USD SOL/USD AVAX/USD DOT/USD AAVE/USD DOGE/USD UNI/USD LINK/USD LTC/USD XRP/USD CRV/USD BCH/USD SUSHI/USD ADA/USD --timeframes 1d --days 1825 --skip-postprocess
          python scripts/capture_bars.py --symbols BTC/USD ETH/USD SOL/USD AVAX/USD DOT/USD AAVE/USD DOGE/USD UNI/USD LINK/USD LTC/USD XRP/USD CRV/USD BCH/USD SUSHI/USD ADA/USD --timeframes 15m --days 365
          if [ -f localdata/explicit_allowlist.json ]; then
            if ! jq -e '.crypto | type == "array"' localdata/explicit_allowlist.json >/dev/null 2>&1; then
              echo "::warning::explicit_allowlist.json missing .crypto array, using default crypto list"
            fi
          fi

      - name: Run autonomous research controller (crypto)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          mkdir -p localdata/research
          # If we have existing merged artifacts, rebuild regime-only to refresh monitored candidates
          if [ -d localdata/research/crypto ] && [ -f localdata/research/crypto/candidate_leaderboard_crypto_rolling.csv ]; then
            echo "Rebuilding regime-aware candidates from existing artifacts"
            python scripts/research_crypto.py --timeframes 1d --regime-only --output-dir localdata/research/crypto --max-regime-targets 150 --max-regime-per-symbol 15 || echo "regime-only rebuild failed"
          else
            echo "No existing crypto research, will build after first discovery"
          fi
          # Sync dynamic paper book: use monitored_candidates if exists, else fallback
          python scripts/sync_monitored_crypto.py --candidates-path localdata/research/crypto/monitored_candidates_crypto.csv --output-path localdata/monitored_slices_crypto.csv
          if [ ! -s localdata/monitored_slices_crypto.csv ]; then
            echo "monitored_candidates empty, trying fallback clean_mixed from leaderboard"
            python scripts/sync_monitored_crypto.py --fallback-clean-mixed --output-path localdata/monitored_slices_crypto.csv
          fi
          ls -lh localdata/monitored_slices_crypto.csv || echo "no crypto book yet"
          if [ -f localdata/research/crypto/monitored_candidates_crypto.csv ]; then
            echo "monitored_candidates_crypto.csv: $(wc -l < localdata/research/crypto/monitored_candidates_crypto.csv) lines"
          fi

      - name: Build research manifest
        run: |
          mkdir -p localdata/research
          NOW=$(date -u +%Y-%m-%dT%H:%M:%S+00:00)
          MANIFEST=$(cat <<EOF
          {"workflow":"research_refresh_crypto","generated_at_utc":"$NOW","orders_placed":false,"monitored_slices_modified":false,"automatic_promotion_enabled":false}
          EOF
          )
          echo "$MANIFEST" | jq . > localdata/research/refresh_state_crypto.json
          cat localdata/research/refresh_state_crypto.json
          if [ -f localdata/research/crypto/crypto_research_summary.json ]; then
            cat localdata/research/crypto/crypto_research_summary.json | jq . | head -50
          fi

      - name: Compute discovery dispatch gate (fresh data) – main-like
        id: dispatch_gate
        run: |
          if [ "${{ inputs.allow_discovery }}" != "true" ]; then
            echo "should_dispatch=false" >> "$GITHUB_OUTPUT"
            echo "Gate closed: allow_discovery=false"
            exit 0
          fi
          # If refresh_state_crypto.json exists, use its gate (mirrors main's refresh_state.json logic)
          if [ -f localdata/research/refresh_state_crypto.json ]; then
            DISPATCH=$(jq -r '
              if .fresh_data_gate_open == true and .sharded_discovery_required == true and (.discovery_ran // false) != true
              then "true"
              elif .fresh_data_gate_open == true and .discovery_ran == false
              then "true"
              else "false" end
            ' localdata/research/refresh_state_crypto.json 2>/dev/null || echo "false")
            # If jq returns null/false but file has no gate fields (legacy), fall back to allow if no monitored candidates
            if [ "$DISPATCH" = "null" ] || [ "$DISPATCH" = "false" ]; then
              if [ ! -f localdata/research/crypto/monitored_candidates_crypto.csv ] || [ ! -s localdata/research/crypto/monitored_candidates_crypto.csv ]; then
                DISPATCH="true"
                echo "Legacy refresh_state, no gate fields, but no monitored candidates – forcing dispatch=true"
              fi
            fi
          else
            # No state yet – first run should dispatch
            if [ ! -f localdata/research/crypto/monitored_candidates_crypto.csv ]; then
              DISPATCH="true"
            else
              # Check if we have at least min_new_daily_bars logic via summary age – simplified to false to avoid runaway
              DISPATCH="false"
              echo "No refresh_state_crypto.json and monitored candidates exist – gate closed to avoid runaway, operator can still manually dispatch via workflow_dispatch"
              # For weekly manual operator intent, if allow_discovery true and summary older than 7 days, open gate
              if [ -f localdata/research/crypto/crypto_research_summary.json ]; then
                AGE_HOURS=$(( ( $(date +%s) - $(stat -c %Y localdata/research/crypto/crypto_research_summary.json) ) / 3600 ))
                if [ "$AGE_HOURS" -gt 168 ]; then
                  DISPATCH="true"
                  echo "Summary older than 7 days ($AGE_HOURS h) – opening gate"
                fi
              fi
            fi
          fi
          echo "should_dispatch=$DISPATCH" >> "$GITHUB_OUTPUT"
          echo "Discovery dispatch gate: $DISPATCH"

      - name: Check operational state cache content
        id: ops_state
        run: |
          shopt -s nullglob
          files=(localdata/research/crypto/candidate_leaderboard_crypto_rolling.csv localdata/research/crypto/monitored_candidates_crypto.csv localdata/monitored_slices_crypto.csv)
          echo "has_state=false" >> "$GITHUB_OUTPUT"
          for f in "${files[@]}"; do if [ -s "$f" ]; then echo "has_state=true" >> "$GITHUB_OUTPUT"; break; fi; done

      - name: Save operational state cache (crypto)
        if: ${{ steps.ops_state.outputs.has_state == 'true' }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            localdata/research/crypto
            localdata/monitored_slices_crypto.csv
          key: live-ops-state-crypto-v1-${{ runner.os }}-${{ github.run_id }}

      - name: Save research warehouse cache
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: localdata/warehouse
          key: ${{ steps.cache_key.outputs.key }}

      - name: Commit isolated research outputs (crypto)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          shopt -s nullglob
          files=(localdata/research/crypto/*.csv localdata/research/crypto/*.json localdata/research/refresh_state_crypto.json)
          if ((${#files[@]}==0)); then echo "No crypto research outputs"; exit 0; fi
          git add "${files[@]}" 2>/dev/null || true
          if git diff --cached --quiet; then echo "No crypto research changes"; exit 0; fi
          git commit -m "chore(research-refresh-crypto): update crypto research state [skip ci]"
          for attempt in 1 2 3 4 5; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" || sleep 5
            git push || sleep $((5*attempt))
            [ $? -eq 0 ] && break
          done

  cache-maintenance:
    needs: research-refresh-crypto
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Remove superseded crypto warehouse caches
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_CACHE_KEY: ${{ needs.research-refresh-crypto.outputs.cache_key }}
        run: |
          sleep 5
          gh cache list --limit 100 --json id,key --repo "$GITHUB_REPOSITORY" > /tmp/caches.json || true
          jq -r '.[] | select(.key | startswith("research-warehouse-v4-")) | select(.key | contains("crypto")) | select(.key != env.CURRENT_CACHE_KEY) | .id' /tmp/caches.json | while read -r id; do
            if [ -n "$id" ]; then gh cache delete "$id" --repo "$GITHUB_REPOSITORY" || true; fi
          done

  dispatch-discovery:
    needs: research-refresh-crypto
    if: ${{ needs.research-refresh-crypto.outputs.should_dispatch_discovery == 'true' }}
    uses: ./.github/workflows/research_crypto_discovery.yml
    with:
      timeframes: ${{ inputs.timeframes }}
      batch_size: ${{ inputs.batch_size }}
      condition_on: ${{ inputs.condition_on }}
    secrets: inherit
